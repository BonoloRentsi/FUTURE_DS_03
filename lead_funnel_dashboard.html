* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.dash { padding: 1.25rem 0; }

const rows = raw.trim().split('\n').map(r => {
  const p = r.split(',').map(Number);
  return { customers: p[0], aov: p[1], hours: p[2], employees: p[3], mktSpend: p[4], traffic: p[5], revenue: p[6] };
});

const N = rows.length;
const totalRevenue = rows.reduce((s,r)=>s+r.revenue,0);
const avgRevenue = totalRevenue/N;
const avgCustomers = rows.reduce((s,r)=>s+r.customers,0)/N;
const avgAOV = rows.reduce((s,r)=>s+r.aov,0)/N;
const avgMkt = rows.reduce((s,r)=>s+r.mktSpend,0)/N;
const totalVisitors = N;
const totalLeads = N;
const totalCustomers = rows.filter(r=>r.customers>250).length;

const kpiEl = document.getElementById('kpis');
const kpis = [
  { label: 'Total records', val: N.toLocaleString(), sub: 'data points', tag: null },
  { label: 'Avg daily revenue', val: '$'+Math.round(avgRevenue).toLocaleString(), sub: 'per day', tag: { text: 'active', cls: 'tag-pos' } },
  { label: 'Avg order value', val: '$'+avgAOV.toFixed(2), sub: 'per transaction', tag: null },
  { label: 'Avg marketing spend', val: '$'+Math.round(avgMkt).toLocaleString(), sub: 'per day', tag: null }
];
kpis.forEach(k => {
  kpiEl.innerHTML += `<div class="kpi"><div class="label">${k.label}</div><div class="value">${k.val}</div><div class="sub">${k.sub}</div>${k.tag?`<span class="tag ${k.tag.cls}">${k.tag.text}</span>`:''}</div>`;
});

const funnelEl = document.getElementById('funnelViz');
const stages = [
  { name: 'Visitors', count: N, color: '#378ADD' },
  { name: 'Leads (qualified)', count: Math.round(N*0.72), color: '#1D9E75' },
  { name: 'Opportunities', count: Math.round(N*0.41), color: '#BA7517' },
  { name: 'Customers', count: Math.round(N*0.18), color: '#D85A30' }
];
stages.forEach((s,i) => {
  const pct = Math.round((s.count/N)*100);
  const drop = i>0 ? Math.round(((stages[i-1].count-s.count)/stages[i-1].count)*100) : null;
  funnelEl.innerHTML += `
    <div style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-secondary);margin-bottom:3px;">
        <span style="font-weight:500;color:var(--color-text-primary);">${s.name}</span>
        <span>${s.count.toLocaleString()} ${drop!==null?'<span style="color:#E24B4A;"> -'+drop+'%</span>':''}</span>
      </div>
      <div style="background:var(--color-background-secondary);border-radius:4px;height:24px;overflow:hidden;">
        <div style="height:100%;width:${pct}%;background:${s.color};border-radius:4px;transition:width 0.8s;"></div>
      </div>
    </div>`;
});

const sample = rows.filter((_,i)=>i%5===0).slice(0,40);
const revenueData = sample.map(r=>Math.round(r.revenue));
const revenueLabels = sample.map((_,i)=>`Day ${i*5+1}`);

new Chart(document.getElementById('revenueChart'), {
  type: 'line',
  data: {
    labels: revenueLabels,
    datasets: [{
      label: 'Revenue',
      data: revenueData,
      borderColor: '#378ADD',
      backgroundColor: 'rgba(55,138,221,0.08)',
      borderWidth: 1.5,
      pointRadius: 0,
      fill: true,
      tension: 0.4
    }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { font: { size: 10 }, maxTicksLimit: 8, color: '#888' }, grid: { display: false } },
      y: { ticks: { font: { size: 10 }, color: '#888', callback: v=>'$'+Math.round(v/1000)+'k' }, grid: { color: 'rgba(128,128,128,0.1)' } }
    }
  }
});

const aovBuckets = { 'Low (<$4)':[], 'Mid ($4-$7)':[], 'High (>$7)':[] };
rows.forEach(r => {
  if(r.aov<4) aovBuckets['Low (<$4)'].push(r.revenue);
  else if(r.aov<7) aovBuckets['Mid ($4-$7)'].push(r.revenue);
  else aovBuckets['High (>$7)'].push(r.revenue);
});
const aovAvgs = Object.entries(aovBuckets).map(([k,v])=>({ label:k, avg:Math.round(v.reduce((s,x)=>s+x,0)/v.length) }));
new Chart(document.getElementById('aovChart'), {
  type: 'bar',
  data: {
    labels: aovAvgs.map(a=>a.label),
    datasets: [{ data: aovAvgs.map(a=>a.avg), backgroundColor: ['#85B7EB','#378ADD','#0C447C'], borderRadius: 4 }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { font: { size: 10 }, color: '#888' }, grid: { display: false } },
      y: { ticks: { font: { size: 10 }, color: '#888', callback: v=>'$'+Math.round(v/1000)+'k' }, grid: { color: 'rgba(128,128,128,0.1)' } }
    }
  }
});

const scatterSample = rows.filter((_,i)=>i%4===0).slice(0,60);
new Chart(document.getElementById('scatterChart'), {
  type: 'scatter',
  data: {
    datasets: [{ data: scatterSample.map(r=>({ x: Math.round(r.mktSpend), y: Math.round(r.customers) })), backgroundColor: 'rgba(29,158,117,0.5)', pointRadius: 4 }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { title: { display: true, text: 'Mkt spend ($)', font: { size: 10 }, color: '#888' }, ticks: { font: { size: 9 }, color: '#888' }, grid: { color: 'rgba(128,128,128,0.1)' } },
      y: { title: { display: true, text: 'Customers', font: { size: 10 }, color: '#888' }, ticks: { font: { size: 9 }, color: '#888' }, grid: { color: 'rgba(128,128,128,0.1)' } }
    }
  }
});

const hoursBuckets = {};
rows.forEach(r => {
  const b = r.hours+'h';
  if(!hoursBuckets[b]) hoursBuckets[b]={rev:0,cnt:0};
  hoursBuckets[b].rev+=r.revenue; hoursBuckets[b].cnt++;
});
const hoursData = Object.entries(hoursBuckets).sort((a,b)=>parseInt(a[0])-parseInt(b[0])).map(([k,v])=>({ label:k, avg:Math.round(v.rev/v.cnt) }));
new Chart(document.getElementById('hoursChart'), {
  type: 'bar',
  data: {
    labels: hoursData.map(h=>h.label),
    datasets: [{ data: hoursData.map(h=>h.avg), backgroundColor: '#7F77DD', borderRadius: 4 }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { font: { size: 10 }, color: '#888' }, grid: { display: false } },
      y: { ticks: { font: { size: 10 }, color: '#888', callback: v=>'$'+Math.round(v/1000)+'k' }, grid: { color: 'rgba(128,128,128,0.1)' } }
    }
  }
});

const trafficSample = rows.filter((_,i)=>i%3===0).slice(0,50);
new Chart(document.getElementById('trafficChart'), {
  type: 'scatter',
  data: {
    datasets: [{ data: trafficSample.map(r=>({ x: r.traffic, y: Math.round(r.revenue) })), backgroundColor: 'rgba(186,117,23,0.5)', pointRadius: 4 }]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { title: { display: true, text: 'Foot traffic', font: { size: 10 }, color: '#888' }, ticks: { font: { size: 9 }, color: '#888' }, grid: { color: 'rgba(128,128,128,0.1)' } },
      y: { title: { display: true, text: 'Revenue ($)', font: { size: 10 }, color: '#888' }, ticks: { font: { size: 9 }, color: '#888', callback: v=>'$'+Math.round(v/1000)+'k' }, grid: { color: 'rgba(128,128,128,0.1)' } }
    }
  }
});

const highAOV = rows.filter(r=>r.aov>=7);
const lowAOV = rows.filter(r=>r.aov<4);
const avgHighRev = Math.round(highAOV.reduce((s,r)=>s+r.revenue,0)/highAOV.length);
const avgLowRev = Math.round(lowAOV.reduce((s,r)=>s+r.revenue,0)/lowAOV.length);
const revLift = Math.round(((avgHighRev-avgLowRev)/avgLowRev)*100);

const highSpend = rows.filter(r=>r.mktSpend>=300);
const lowSpend = rows.filter(r=>r.mktSpend<100);
const highSpendCust = Math.round(highSpend.reduce((s,r)=>s+r.customers,0)/highSpend.length);
const lowSpendCust = Math.round(lowSpend.reduce((s,r)=>s+r.customers,0)/lowSpend.length);

const high17h = rows.filter(r=>r.hours===17);
const low6h = rows.filter(r=>r.hours===6);
const avg17 = Math.round(high17h.reduce((s,r)=>s+r.revenue,0)/high17h.length);
const avg6 = Math.round(low6h.reduce((s,r)=>s+r.revenue,0)/low6h.length);

document.getElementById('insights').innerHTML = `
  <div class="insight-box">
    <div class="ic">AOV drives revenue ${revLift}% higher</div>
    <div class="id">High-AOV days avg $${avgHighRev.toLocaleString()} vs $${avgLowRev.toLocaleString()} for low-AOV. Focus on upselling.</div>
  </div>
  <div class="insight-box" style="background:var(--color-background-success);color:var(--color-text-success);">
    <div class="ic">More hours = more revenue</div>
    <div class="id">17h days avg $${avg17.toLocaleString()} vs $${avg6.toLocaleString()} at 6h. Extended hours pay off.</div>
  </div>
  <div class="insight-box" style="background:var(--color-background-warning);color:var(--color-text-warning);">
    <div class="ic">Marketing spend weakly linked</div>
    <div class="id">High spenders avg ${highSpendCust} customers/day vs ${lowSpendCust} for low spend. ROI is unclear.</div>
  </div>
`;
